# Blueprint de Render: https://render.com/docs/infrastructure-as-code
# Tras conectar el repo, Render lee este archivo y crea el servicio.

services:
  - type: web
    name: dashboard-q1-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
