<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visión 2026 — Stencil Group</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{--navy:#0D1B2A;--navy2:#1B2838;--navy3:#243447;--teal:#2EC4B6;--lime:#CDDC39;--gold:#F0C040;--coral:#FF6B6B;--bg:#0a1118;--card:#131e2a;--card2:#1a2a3a;--text:#e8edf2;--muted:#8899aa;--border:#1e3348;--green:#4CAF50;--red:#ef5350;--yellow:#FFC107}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.4rem);background:linear-gradient(135deg,var(--teal),var(--lime));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);margin-top:4px;font-size:0.9rem}

/* Quarter selector */
.tri-selector{display:flex;gap:6px;margin-bottom:12px;justify-content:center}
.tri-btn{padding:10px 24px;border:2px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;border-radius:12px;font-size:0.9rem;font-weight:700;transition:all .2s;font-family:inherit}
.tri-btn.active{border-color:var(--teal);background:linear-gradient(135deg,rgba(46,196,182,.15),rgba(46,196,182,.05));color:var(--teal);box-shadow:0 0 20px rgba(46,196,182,.15)}
.tri-btn:hover:not(.active){border-color:var(--navy3);color:var(--text);background:var(--card2)}
.tri-label{font-size:0.75rem;color:var(--muted);font-weight:400}

.nav{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;background:var(--card);border-radius:12px;padding:4px}
.nav button{padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:10px;font-size:0.85rem;font-weight:600;transition:all .2s;font-family:inherit;white-space:nowrap}
.nav button.active{background:linear-gradient(135deg,var(--teal),#25a89c);color:#fff;box-shadow:0 2px 8px rgba(46,196,182,.3)}
.nav button:hover:not(.active){color:var(--text);background:var(--navy3)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.kpi-card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--border);transition:all .25s;position:relative;overflow:hidden}
.kpi-card:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kpi-card .label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-card .value{font-size:clamp(1.4rem,2.5vw,1.8rem);font-weight:700}
.kpi-card .sub{font-size:0.78rem;color:var(--muted);margin-top:4px}
.kpi-card .accent{position:absolute;top:0;left:0;right:0;height:3px}
.section{margin-bottom:24px}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.7rem;font-weight:600}
.panel{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;display:flex;justify-content:space-between;align-items:center}
.table-wrap{overflow-x:auto;max-height:600px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
th{background:var(--navy2);padding:10px 12px;text-align:left;font-weight:600;color:var(--muted);text-transform:uppercase;font-size:0.7rem;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:9px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(46,196,182,.04)}
.bar{height:8px;border-radius:4px;background:var(--navy3);overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
.sem{font-size:1.3rem;text-align:center}
.search-box{padding:10px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:0.85rem;font-family:inherit}
.search-box:focus{outline:none;border-color:var(--teal)}
.area-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:all .25s}
.area-card:hover{border-color:var(--teal)}
.area-header{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.area-body{padding:0 18px 14px}
.ini-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:0.83rem}
.ini-item:last-child{border-bottom:none}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:0.68rem;font-weight:600;margin-right:4px}
.chart-bar-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.chart-bar-h .bar-label{width:90px;font-size:0.78rem;text-align:right;color:var(--muted);flex-shrink:0}
.chart-bar-h .bar-track{flex:1;height:28px;background:var(--navy3);border-radius:6px;overflow:hidden;position:relative}
.chart-bar-h .bar-value{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 10px;font-size:0.75rem;font-weight:600;color:#fff;transition:width .6s}
.chart-bar-h .bar-amount{width:110px;font-size:0.82rem;font-weight:600;text-align:right;flex-shrink:0}
.back-btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--teal);cursor:pointer;border-radius:8px;font-size:0.8rem;font-family:inherit;margin-bottom:12px}
.back-btn:hover{background:rgba(46,196,182,.1)}
.money{color:var(--teal)}.money-gold{color:var(--gold)}.money-coral{color:var(--coral)}
.btn-inline{font-size:0.72rem;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--teal);cursor:pointer;font-family:inherit}
.btn-inline:hover{background:rgba(46,196,182,.12)}
.inp-inline{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.8rem;font-family:inherit}
.inp-inline:focus{outline:none;border-color:var(--teal)}
select.inp-inline{cursor:pointer}

/* Initiative edit card */
.ini-edit-card{background:var(--card2);border:1px solid var(--teal);border-radius:10px;padding:16px;margin:8px 0}
.edit-grid{display:grid;grid-template-columns:100px 1fr;gap:8px;align-items:start}
.edit-grid label{font-size:0.78rem;color:var(--muted);padding-top:8px}
.edit-grid textarea{resize:vertical}

@media(max-width:768px){.app{padding:10px}.kpi-card{padding:14px}.nav button{padding:8px 10px;font-size:0.78rem}.tri-selector{flex-wrap:wrap}.tri-btn{padding:8px 16px;font-size:0.82rem}.edit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script src="/app.js"></script>
</body>
</html>
